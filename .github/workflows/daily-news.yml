name: AI News Generate

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python fetch_multi_source.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: python generate_ai_summary.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - run: python build_html.py

      - run: |
          git config user.name "AI News Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ || true
          git diff --cached --quiet || git commit -m "update data"
          git push || true

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          force_orphan: true
