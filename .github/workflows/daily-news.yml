name: AI News Digest

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'config.json'
      - 'fetch_multi_source.py'
      - 'generate_ai_summary.py'
      - 'build_html.py'
      - '.github/workflows/daily-news.yml'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch news
        run: python fetch_multi_source.py

      - name: AI curate and summarize
        run: python generate_ai_summary.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}

      - name: Build page
        run: python build_html.py

      - name: Include data directory in published output
        run: |
          mkdir -p output/data
          cp -r data/. output/data/

      - name: Commit data
        run: |
          git config user.name "AI News Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ || true
          git diff --cached --quiet || git commit -m "update data $(date +%Y-%m-%d)"
          git push || true

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          force_orphan: true
