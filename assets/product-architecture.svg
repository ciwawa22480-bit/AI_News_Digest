<svg width="1500" height="980" viewBox="0 0 1500 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title{font:700 30px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#172033}
      .subtitle{font:500 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#667085}
      .layer-title{font:700 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#172033}
      .layer-index{font:700 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#667085}
      .card-title{font:700 17px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2937}
      .card-copy{font:500 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#667085}
      .pill{font:700 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#475467}
      .flow{stroke:#b8c0cc;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
      .flow-soft{stroke:#c9d0da;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:5 7}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L9 5L1 9" stroke="#b8c0cc" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L9 5L1 9" stroke="#c9d0da" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#101828" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1500" height="980" rx="28" fill="#fbfcff"/>
  <text x="750" y="48" text-anchor="middle" class="title">AI News Digest 产品架构</text>
  <text x="750" y="78" text-anchor="middle" class="subtitle">多源采集 → Goal 分段 → Ralph 断点 → Kleisli 证据 → 聚合交付</text>

  <!-- Layer backgrounds -->
  <g filter="url(#shadow)">
    <rect x="90" y="115" width="1320" height="130" rx="14" fill="#f3f7ff" stroke="#5b84dc" stroke-width="1.6"/>
    <rect x="90" y="280" width="1320" height="130" rx="14" fill="#f5efff" stroke="#8b6add" stroke-width="1.6"/>
    <rect x="90" y="445" width="1320" height="130" rx="14" fill="#edf9f1" stroke="#49a66b" stroke-width="1.6"/>
    <rect x="90" y="610" width="1320" height="130" rx="14" fill="#fff8e6" stroke="#d6a12d" stroke-width="1.6"/>
    <rect x="90" y="775" width="1320" height="130" rx="14" fill="#fff1f1" stroke="#e86666" stroke-width="1.6"/>
  </g>

  <!-- Left labels -->
  <g>
    <text x="54" y="170" text-anchor="middle" class="layer-index">①</text>
    <text x="54" y="197" text-anchor="middle" class="layer-title" transform="rotate(-90 54 197)">数据抓取层</text>
    <text x="54" y="335" text-anchor="middle" class="layer-index">②</text>
    <text x="54" y="362" text-anchor="middle" class="layer-title" transform="rotate(-90 54 362)">结构化存储层</text>
    <text x="54" y="500" text-anchor="middle" class="layer-index">③</text>
    <text x="54" y="527" text-anchor="middle" class="layer-title" transform="rotate(-90 54 527)">LLM 分析层</text>
    <text x="54" y="665" text-anchor="middle" class="layer-index">④</text>
    <text x="54" y="692" text-anchor="middle" class="layer-title" transform="rotate(-90 54 692)">Kleisli 质控层</text>
    <text x="54" y="830" text-anchor="middle" class="layer-index">⑤</text>
    <text x="54" y="857" text-anchor="middle" class="layer-title" transform="rotate(-90 54 857)">聚合输出层</text>
  </g>

  <!-- Ingest cards -->
  <g>
    <rect x="130" y="140" width="280" height="80" rx="10" fill="#ffffff" stroke="#5b84dc" stroke-width="1.4"/>
    <text x="270" y="172" text-anchor="middle" class="card-title">中文媒体</text>
    <text x="270" y="197" text-anchor="middle" class="card-copy">新智元 / 量子位 / 机器之心 / IT之家</text>

    <rect x="450" y="140" width="280" height="80" rx="10" fill="#ffffff" stroke="#5b84dc" stroke-width="1.4"/>
    <text x="590" y="172" text-anchor="middle" class="card-title">海外一手源</text>
    <text x="590" y="197" text-anchor="middle" class="card-copy">OpenAI / Anthropic / HF / HN</text>

    <rect x="770" y="140" width="280" height="80" rx="10" fill="#ffffff" stroke="#5b84dc" stroke-width="1.4"/>
    <text x="910" y="172" text-anchor="middle" class="card-title">社区与结构化源</text>
    <text x="910" y="197" text-anchor="middle" class="card-copy">Builder / agents-radar / AI HOT / PH</text>

    <rect x="1090" y="140" width="280" height="80" rx="10" fill="#ffffff" stroke="#5b84dc" stroke-width="1.4"/>
    <text x="1230" y="172" text-anchor="middle" class="card-title">抓取与降级</text>
    <text x="1230" y="197" text-anchor="middle" class="card-copy">news-aggregator / smart-web-fetch / 搜索</text>
  </g>

  <!-- Storage cards -->
  <g>
    <rect x="130" y="305" width="245" height="80" rx="10" fill="#ffffff" stroke="#8b6add" stroke-width="1.4"/>
    <text x="252" y="337" text-anchor="middle" class="card-title">Goal Ledger</text>
    <text x="252" y="362" text-anchor="middle" class="card-copy">.progress / .done / 运行状态</text>

    <rect x="420" y="305" width="245" height="80" rx="10" fill="#ffffff" stroke="#8b6add" stroke-width="1.4"/>
    <text x="542" y="337" text-anchor="middle" class="card-title">采集快照</text>
    <text x="542" y="362" text-anchor="middle" class="card-copy">01 中文 / 02 英文</text>

    <rect x="710" y="305" width="245" height="80" rx="10" fill="#ffffff" stroke="#8b6add" stroke-width="1.4"/>
    <text x="832" y="337" text-anchor="middle" class="card-title">社区快照</text>
    <text x="832" y="362" text-anchor="middle" class="card-copy">03 Builder / 04 虾评</text>

    <rect x="1000" y="305" width="245" height="80" rx="10" fill="#ffffff" stroke="#8b6add" stroke-width="1.4"/>
    <text x="1122" y="337" text-anchor="middle" class="card-title">增强快照</text>
    <text x="1122" y="362" text-anchor="middle" class="card-copy">05 MCP-RSS / 06 HN 共识</text>

    <rect x="1272" y="317" width="98" height="56" rx="28" fill="#fff" stroke="#8b6add" stroke-width="1.2"/>
    <text x="1321" y="340" text-anchor="middle" class="pill">Ralph Loop</text>
    <text x="1321" y="358" text-anchor="middle" class="card-copy">断点续跑</text>
  </g>

  <!-- Analysis cards -->
  <g>
    <rect x="210" y="470" width="300" height="80" rx="10" fill="#ffffff" stroke="#49a66b" stroke-width="1.4"/>
    <text x="360" y="502" text-anchor="middle" class="card-title">归类打标</text>
    <text x="360" y="527" text-anchor="middle" class="card-copy">板块 / 公司 / 赛道 / 时间线</text>

    <rect x="600" y="470" width="300" height="80" rx="10" fill="#ffffff" stroke="#49a66b" stroke-width="1.4"/>
    <text x="750" y="502" text-anchor="middle" class="card-title">信号判断</text>
    <text x="750" y="527" text-anchor="middle" class="card-copy">重磅 / 值得关注 / 常规</text>

    <rect x="990" y="470" width="300" height="80" rx="10" fill="#ffffff" stroke="#49a66b" stroke-width="1.4"/>
    <text x="1140" y="502" text-anchor="middle" class="card-title">摘要生成</text>
    <text x="1140" y="527" text-anchor="middle" class="card-copy">事实摘要 / HN 共识 / 行动建议</text>
  </g>

  <!-- Quality cards -->
  <g>
    <rect x="210" y="635" width="300" height="80" rx="10" fill="#ffffff" stroke="#d6a12d" stroke-width="1.4"/>
    <text x="360" y="667" text-anchor="middle" class="card-title">Kleisli Gate</text>
    <text x="360" y="692" text-anchor="middle" class="card-copy">跨日去重 / 状态传递 / 证据 trace</text>

    <rect x="600" y="635" width="300" height="80" rx="10" fill="#ffffff" stroke="#d6a12d" stroke-width="1.4"/>
    <text x="750" y="667" text-anchor="middle" class="card-title">Fact Check</text>
    <text x="750" y="692" text-anchor="middle" class="card-copy">公司名 / 数字 / 时间线 / 原文链接</text>

    <rect x="990" y="635" width="300" height="80" rx="10" fill="#ffffff" stroke="#d6a12d" stroke-width="1.4"/>
    <text x="1140" y="667" text-anchor="middle" class="card-title">体验检查</text>
    <text x="1140" y="692" text-anchor="middle" class="card-copy">链接可点 / CSV 12 列 / Markdown 可读</text>
  </g>

  <!-- Output cards -->
  <g>
    <rect x="130" y="800" width="280" height="80" rx="10" fill="#ffffff" stroke="#e86666" stroke-width="1.4"/>
    <text x="270" y="832" text-anchor="middle" class="card-title">Markdown 日报</text>
    <text x="270" y="857" text-anchor="middle" class="card-copy">3 分钟可读 / 原文链接完整</text>

    <rect x="450" y="800" width="280" height="80" rx="10" fill="#ffffff" stroke="#e86666" stroke-width="1.4"/>
    <text x="590" y="832" text-anchor="middle" class="card-title">12 列 CSV</text>
    <text x="590" y="857" text-anchor="middle" class="card-copy">表格 / 看板 / 知识库</text>

    <rect x="770" y="800" width="280" height="80" rx="10" fill="#ffffff" stroke="#e86666" stroke-width="1.4"/>
    <text x="910" y="832" text-anchor="middle" class="card-title">质量审核报告</text>
    <text x="910" y="857" text-anchor="middle" class="card-copy">Gate 状态 / 风险标记</text>

    <rect x="1090" y="800" width="280" height="80" rx="10" fill="#ffffff" stroke="#e86666" stroke-width="1.4"/>
    <text x="1230" y="832" text-anchor="middle" class="card-title">团队复用</text>
    <text x="1230" y="857" text-anchor="middle" class="card-copy">晨会 / 投研 / 选题</text>
  </g>

  <!-- Flow connectors -->
  <g>
    <path class="flow" marker-end="url(#arrow)" d="M270 220V260H542V302"/>
    <path class="flow" marker-end="url(#arrow)" d="M590 220V260H542V302"/>
    <path class="flow" marker-end="url(#arrow)" d="M910 220V260H832V302"/>
    <path class="flow" marker-end="url(#arrow)" d="M1230 220V260H1122V302"/>

    <path class="flow-soft" marker-end="url(#arrow-soft)" d="M1321 373V425H750V468"/>
    <path class="flow" marker-end="url(#arrow)" d="M542 385V425H360V468"/>
    <path class="flow" marker-end="url(#arrow)" d="M832 385V425H750V468"/>
    <path class="flow" marker-end="url(#arrow)" d="M1122 385V425H1140V468"/>

    <path class="flow" marker-end="url(#arrow)" d="M360 550V592H360V632"/>
    <path class="flow" marker-end="url(#arrow)" d="M750 550V632"/>
    <path class="flow" marker-end="url(#arrow)" d="M1140 550V592H1140V632"/>
    <path class="flow-soft" marker-end="url(#arrow-soft)" d="M510 675H598"/>
    <path class="flow-soft" marker-end="url(#arrow-soft)" d="M900 675H988"/>

    <path class="flow" marker-end="url(#arrow)" d="M360 715V755H270V798"/>
    <path class="flow" marker-end="url(#arrow)" d="M750 715V755H590V798"/>
    <path class="flow" marker-end="url(#arrow)" d="M750 715V755H910V798"/>
    <path class="flow" marker-end="url(#arrow)" d="M1140 715V755H1230V798"/>
  </g>

  <text x="750" y="936" text-anchor="middle" class="subtitle">设计原则：Goal 切分上下文，Ralph Loop 保持连续性，Kleisli Gate 传递证据，最后聚合成日报资产。</text>
</svg>
